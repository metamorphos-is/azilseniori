<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azil Seniori — Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Azil Seniori</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Schimbă tema">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
      </button>
    </header>

    <main class="main">
      <section class="card">
        <h2>Bine ai venit!</h2>
        <p>
          Aceasta este o aplicație demo simplă. Apasă butonul din colțul dreapta-sus
          pentru a comuta între <strong>Day Mode</strong> și <strong>Night Mode</strong>.
        </p>
        <p class="status">
          Tema curentă: <span id="current-theme">Day Mode</span>
        </p>
      </section>
    </main>

    <footer class="footer">
      <p>Demo Hostinger · Azil Seniori · Git <code>__GIT_SHA__</code></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
